name: Build extension package

on:
  workflow_dispatch:

jobs:
  native-artifact:
    name: Native windows-x64
    runs-on: windows-latest
    env:
      PLATFORM: windows-x64
      TARGET: x86_64-pc-windows-msvc
      LIBRARY: clip_capi.dll
      WORKER: clip_cli.exe

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}

      - name: Build native renderer
        shell: pwsh
        run: |
          cd native/rust
          cargo build --release --target $env:TARGET -p clip_capi -p clip_cli

      - name: Stage native artifacts
        shell: pwsh
        run: |
          $source = "native/rust/target/$env:TARGET/release"
          $dest = "native-artifacts/$env:PLATFORM"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Copy-Item "$source/$env:LIBRARY" "$dest/$env:LIBRARY"
          Copy-Item "$source/$env:WORKER" "$dest/$env:WORKER"

      - name: Upload native artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-windows-x64
          path: native-artifacts/windows-x64
          if-no-files-found: error

  extension-package:
    name: Windows x64 extension zip
    runs-on: windows-latest
    needs: native-artifact

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-windows-x64
          path: native/artifacts
          merge-multiple: false

      - name: Normalize artifact directories
        shell: pwsh
        run: |
          foreach ($dir in Get-ChildItem native/artifacts -Directory) {
            if ($dir.Name.StartsWith("native-")) {
              $platform = $dir.Name.Substring("native-".Length)
              $target = Join-Path "native/artifacts" $platform
              if (Test-Path $target) {
                Remove-Item -Recurse -Force $target
              }
              Move-Item $dir.FullName $target
            }
          }

      - name: Build Windows x64 extension package
        shell: pwsh
        run: |
          python tools/build_blender_addon.py --platform windows-x64 --output clip_studio_importer-windows-x64.zip

      - name: Upload Windows x64 extension package
        uses: actions/upload-artifact@v4
        with:
          name: clip_studio_importer-windows-x64
          path: clip_studio_importer-windows-x64.zip
          if-no-files-found: error
